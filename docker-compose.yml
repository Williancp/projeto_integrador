version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: projeto_integrador_db
    environment:
      POSTGRES_DB: projeto_integrador
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./projeto_integrador_backend/init_database.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - projeto_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./projeto_integrador_backend
      dockerfile: Dockerfile
    container_name: projeto_integrador_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/projeto_integrador
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - projeto_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/auth/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

networks:
  projeto_network:
    driver: bridge
