name: projeto_integrador
description: "Aplicativo móvel para levantamento e gerenciamento de dados rurais."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP and API
  http: ^1.1.0
  
  # State Management
  provider: ^6.0.0
  
  # Local Storage
  shared_preferences: ^2.2.0
  
  # JSON Serialization
  json_serializable: ^6.7.0
  json_annotation: ^4.8.1
  
  # UI Components
  intl: ^0.19.0
  
  # Navigation
  go_router: ^10.0.0
  
  # Validation
  validators: ^3.0.0
  
  # Loading and Error Handling
  connectivity_plus: ^5.0.0
  
  # Logging
  logger: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.0
  build_runner: ^2.4.0
  json_serializable: ^6.7.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
  
